<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>트레이딩 봇</title>
<style>
  :root { --bg:#0e1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3140; --fg:#e6e9ef; --mut:#8a90a0;
          --up:#26d07c; --down:#ff5c6c; --blue:#4c9be8; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font-family:system-ui,-apple-system,sans-serif; }
  .wrap { max-width:1000px; margin:0 auto; padding:20px; }
  header { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  h1 { font-size:18px; margin:0; }
  .badge { padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
  .ok { background:rgba(38,208,124,.15); color:var(--up); }
  .stale { background:rgba(255,92,108,.15); color:var(--down); }
  .sub { color:var(--mut); font-size:13px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .card .k { color:var(--mut); font-size:12px; margin-bottom:6px; }
  .card .v { font-size:24px; font-weight:700; }
  .pos { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:16px; }
  .pos h3, .trades h3 { margin:0 0 10px; font-size:14px; color:var(--mut); font-weight:600; }
  .posgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; }
  .posgrid .k { color:var(--mut); font-size:11px; } .posgrid .v { font-size:15px; font-weight:600; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:right; padding:6px 8px; border-bottom:1px solid var(--line); }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--mut); font-weight:600; font-size:12px; }
  .g { color:var(--up); } .r { color:var(--down); }
  canvas { width:100%; height:120px; display:block; }
  .empty { color:var(--mut); padding:20px; text-align:center; }
  .err { background:rgba(255,92,108,.1); border:1px solid var(--down); color:var(--down);
         padding:12px; border-radius:8px; }
  .ctrlbar { display:flex; gap:16px; flex-wrap:wrap; background:var(--panel); border:1px solid var(--line);
             border-radius:10px; padding:10px 14px; margin-bottom:16px; }
  .svc { display:flex; align-items:center; gap:8px; font-size:13px; }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.r { background:var(--up); } .dot.p { background:#e0a030; }
  .svc button { padding:4px 12px; border-radius:6px; border:1px solid var(--line); background:var(--panel2);
                color:var(--fg); cursor:pointer; font-size:12px; }
  .svc button:hover { border-color:var(--blue); }
  .svc select { background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:6px;
                padding:4px 8px; font-size:12px; cursor:pointer; max-width:260px; }
  .svc select:hover { border-color:var(--blue); }
  .trow { cursor:pointer; }
  .trow:hover td { background:rgba(255,255,255,.04); }
  .trow .cursor { color:var(--mut); font-size:10px; }
  .exprow > td { padding:0; background:var(--panel2); border-bottom:1px solid var(--line); }
  .tchart { width:100%; padding:8px 4px; }
  .tchart .caption { color:var(--mut); font-size:12px; padding:4px 6px 8px; }
  .pager { display:flex; align-items:center; justify-content:center; gap:14px; padding:12px 0 2px; }
  .pager button { padding:5px 14px; border-radius:6px; border:1px solid var(--line); background:var(--panel2);
                  color:var(--fg); cursor:pointer; font-size:13px; }
  .pager button:hover:not(:disabled) { border-color:var(--blue); }
  .pager button:disabled { opacity:.4; cursor:default; }
  .tabs { display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--line); }
  .tab { padding:9px 18px; background:none; border:none; border-bottom:2px solid transparent;
         color:var(--mut); cursor:pointer; font-size:14px; font-weight:600; }
  .tab.active { color:var(--fg); border-bottom-color:var(--blue); }
  .tab:hover { color:var(--fg); }
  .fresh-g { color:var(--up); } .fresh-y { color:#e0a030; } .fresh-r { color:var(--down); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:3px 9px;
          font-family:ui-monospace,monospace; font-size:12px; }
  .chip b { cursor:pointer; color:var(--mut); margin-left:5px; font-weight:600; }
  .chip b:hover { color:var(--down); }
  .syminput { background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:6px;
              padding:5px 10px; font-size:13px; width:100%; font-family:ui-monospace,monospace; }
  /* 심볼 자동완성 콤보박스 — 백테스트 스튜디오(gui.html)와 같은 패턴 */
  .combo { position:relative; max-width:260px; }
  .dropdown { position:absolute; top:100%; left:0; right:0; z-index:30; margin-top:3px;
    background:var(--panel); border:1px solid var(--line); border-radius:7px; max-height:260px;
    overflow-y:auto; overflow-x:hidden; box-shadow:0 6px 20px rgba(0,0,0,.4); }
  .dropdown .opt { padding:7px 10px; cursor:pointer; font-size:13px; display:flex;
    justify-content:space-between; gap:10px; align-items:center; font-family:ui-monospace,monospace;
    white-space:nowrap; overflow:hidden; }
  .dropdown .opt:hover, .dropdown .opt.active { background:var(--panel2); }
  .dropdown .opt.dim { opacity:.45; cursor:default; }
  .dropdown .opt .r { color:var(--mut); font-size:10px; white-space:nowrap; font-family:inherit; }
  .dropdown .empty2 { padding:9px 10px; color:var(--mut); font-size:12px; }
  .syminput:focus { outline:none; border-color:var(--blue); }
  .progress { height:10px; background:var(--panel2); border-radius:5px; overflow:hidden; margin:12px 0 6px; }
  .progress .pfill { height:100%; width:0%; background:var(--blue); transition:width .2s; }
  .btn-go { padding:7px 14px; border-radius:7px; border:0; background:var(--blue); color:#fff; cursor:pointer; font-size:13px; }
  .btn-stop { padding:7px 14px; border-radius:7px; border:0; background:var(--down); color:#fff; cursor:pointer; font-size:13px; }
  .field { display:flex; align-items:center; gap:8px; margin:8px 0; font-size:13px; }
  .field label { color:var(--mut); min-width:80px; }
  .field input { background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:6px 9px; font-size:13px; }
</style>
</head>
<body>
<script src="/vendor/lightweight-charts.js"></script>
<div class="wrap">
  <header>
    <h1 id="title">🤖 트레이딩 봇</h1>
    <!-- 백테스트 스튜디오는 로컬(engine.server)에만 있다. 프로덕션 대시보드는 __NO_STUDIO__ 로 숨김 -->
    <a href="/backtest" id="studioLink" style="color:var(--blue);text-decoration:none;font-size:13px">🔬 백테스트</a>
    <a href="/collector" style="color:var(--blue);text-decoration:none;font-size:13px">📥 데이터·수집기</a>
    <a href="/settings" style="color:var(--blue);text-decoration:none;font-size:13px">⚙️ 설정</a>
    <span class="badge" id="status">…</span>
    <span class="sub" id="meta"></span>
    <span class="sub" style="margin-left:auto" id="updated"></span>
  </header>
  <div id="tab-trading">
    <div id="control" class="ctrlbar"></div>
    <div id="botcfg" class="pos"><div class="sub">봇 설정 불러오는 중…</div></div>
    <div id="grStatusBar"></div><!-- 가드레일 '발동 상태'만 여기(모니터). 설정은 /settings -->
    <div id="body"><div class="empty">상태 불러오는 중…</div></div>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
const fmt = n => n==null ? "–" : Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
const fmtT = ms => { const d=new Date(ms); return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); };
const RN = {take_profit:"익절", stop_loss:"손절", trailing:"트레일링", signal:"신호청산", time:"시간청산", supertrend:"ST전환", liquidation:"강제청산"};

function svcBtn(svc, label, state){
  const paused = state === "paused";
  return `<span class="svc"><b>${label}</b> <span class="dot ${paused?'p':'r'}"></span>${paused?'멈춤':'실행중'} `
    + `<button onclick="setSvc('${svc}','${paused?'running':'paused'}')">${paused?'▶ 재개':'⏸ 멈춤'}</button></span>`;
}
let STRATS = [];
async function loadStrategies(){
  try { STRATS = ((await (await fetch("/api/strategies",{cache:"no-store"})).json()).strategies)||[]; } catch(e){}
}
function stratSelector(d, selPath){
  if (!STRATS.length) return "";
  const active = selPath || (d && d.strategy) || "";     // 사용자가 고른(control.json) 전략을 표시
  const running = d && d.strategy;                        // 봇이 실제 실행 중인 전략(state.json)
  const pending = (running && running !== active) ? active : null;   // 골랐지만 봇이 아직 안 바꿈
  const cur = STRATS.find(s => s.path === active);
  window._stratActivePath = active || "";
  // 전략 출처: examples=배포된 것(git) · saved=로컬 GUI · strategies=볼륨에 던져넣은 것(배포 무관)
  const srcIcon = (s) => s === "saved" ? "📁 " : s === "strategies" ? "📤 " : "";
  const curLabel = cur ? (srcIcon(cur.source)+cur.name) : "";
  window._stratCurLabel = curLabel;                      // 선택값(포커스 해제 시 복원)
  // 심볼 검색과 같은 콤보박스: 선택값을 입력창에 표시, 포커스=검색, 클릭/Enter로 선택
  let html = `<span class="svc"><b>전략</b>`
    + `<span class="combo" style="max-width:320px">`
    + `<input id="stratInput" class="syminput" autocomplete="off" placeholder="전략 검색" value="${curLabel}"`
    + ` onfocus="this.select();openStratDrop('')" oninput="openStratDrop(this.value)" onkeydown="stratKey(event)"`
    + ` onblur="blurStrat()">`
    + `<span class="dropdown" id="stratDD" style="display:none"></span></span></span>`;
  if (pending){
    const pn = (STRATS.find(s=>s.path===pending)||{}).name || pending;
    html += `<span class="svc" style="color:#e0a030">⏳ 전환 대기: <b>${pn}</b> <span class="sub">포지션 청산 후 적용</span></span>`;
  }
  if (d && d.strategyError) html += `<span class="svc" style="color:var(--down)">⚠ ${d.strategyError}</span>`;
  return html;
}
async function setStrat(path){
  try {
    const r = await (await fetch("/api/strategy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path})})).json();
    if (r && r.error) alert("전략 선택 실패: "+r.error);
  } catch(e){ alert("전략 선택 실패: "+e); }
}
function _stratOptsHTML(q){
  const query = (q||"").toLowerCase();
  const active = window._stratActivePath;
  const matches = STRATS.filter(s => s.name.toLowerCase().includes(query));
  window._stratMatches = matches; window._stratIdx = -1;
  if (!matches.length) return `<div class="empty2">일치하는 전략 없음</div>`;
  return matches.map(s => {
    const mark = srcIcon(s.source) + (s.path===active?"✓ ":"");
    return `<div class="opt" data-path="${s.path}" onmousedown="stratPick(event)">${mark}${s.name}</div>`;
  }).join("");
}
function openStratDrop(q){
  const dd = document.getElementById("stratDD"); if (!dd) return;
  document.querySelectorAll(".dropdown").forEach(x => { if (x!==dd) x.style.display="none"; });
  dd.innerHTML = _stratOptsHTML(q);
  dd.style.display = ""; window._stratOpen = true;
}
function closeStratDrop(){
  const dd = document.getElementById("stratDD"); if (dd) dd.style.display = "none";
  window._stratOpen = false;
}
function blurStrat(){                                 // 포커스 해제 → 닫고, 안 고른 채 나가면 선택값 복원
  setTimeout(() => {
    closeStratDrop();
    const inp = document.getElementById("stratInput");
    if (inp && document.activeElement !== inp) inp.value = window._stratCurLabel || "";
  }, 150);
}
function stratPick(e){
  const el = e.target.closest(".opt"); if (!el || !el.dataset.path) return;
  e.preventDefault();                              // blur보다 먼저 발생 → 선택 반영
  pickStrat(el.dataset.path);
}
function stratKey(e){
  if (e.key === "Escape"){ closeStratDrop(); return; }
  const dd = document.getElementById("stratDD");
  const els = dd ? [...dd.querySelectorAll(".opt")] : [];
  if (e.key === "Enter"){
    e.preventDefault();
    const el = els[window._stratIdx >= 0 ? window._stratIdx : 0];
    if (el) pickStrat(el.dataset.path);
    return;
  }
  if (!els.length) return;
  if (e.key === "ArrowDown"){ window._stratIdx = Math.min((window._stratIdx ?? -1)+1, els.length-1); e.preventDefault(); }
  else if (e.key === "ArrowUp"){ window._stratIdx = Math.max((window._stratIdx ?? 0)-1, 0); e.preventDefault(); }
  else return;
  els.forEach((o,i) => o.classList.toggle("active", i===window._stratIdx));
  els[window._stratIdx].scrollIntoView({ block:"nearest" });
}
async function pickStrat(path){
  window._stratOpen = false;
  const dd = document.getElementById("stratDD"); if (dd) dd.style.display = "none";
  const inp = document.getElementById("stratInput"); if (inp) inp.blur();
  await setStrat(path);
  renderControl(window._lastState);                // 즉시 반영(전환/대기 표시)
}
async function renderControl(d){
  let c = {};
  try { c = await (await fetch("/api/control",{cache:"no-store"})).json(); } catch(e){}
  const html = svcBtn("trader","봇", c.trader||"running") + stratSelector(d, c.strategy);   // 표시=선택(control.json)
  // tick(3초)마다 통째로 다시 그리면 열어둔/타이핑 중인 전략 콤보박스가 리셋된다.
  // → 내용이 그대로거나, 드롭다운이 열려 있거나, 입력창에 포커스면 재렌더 생략.
  const si = document.getElementById("stratInput");
  if (html === window._lastControlHTML || window._stratOpen || (si && document.activeElement === si)) return;
  window._lastControlHTML = html;
  $("control").innerHTML = html;
}
async function setSvc(svc, state){
  try { await fetch("/api/control",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({service:svc,state})}); }
  catch(e){ alert("제어 실패: "+e); }
  renderControl(window._lastState);
}

async function tick(){
  let d;
  try { d = await (await fetch("/api/state",{cache:"no-store"})).json(); }
  catch(e){ renderControl(null); window._lastTradeN=-1; $("body").innerHTML = `<div class="err">상태 서버 응답 없음: ${e}</div>`; return; }
  window._lastState = d;
  renderControl(d);
  if (d.error){ window._lastTradeN=-1; $("body").innerHTML = `<div class="err">${d.error}</div>`; $("status").className="badge stale"; $("status").textContent="대기"; return; }

  $("meta").textContent = `${d.preset} · ${d.symbol} ${d.timeframe} · ${d.mode==='live'?'실거래':'페이퍼'} · 초기 ${fmt(d.initialEquity)}`;
  const age = Date.now() - d.updatedAt;
  const alive = age < 3*60*1000;    // 3분 내 갱신이면 정상
  if (!alive){ $("status").className="badge stale"; $("status").textContent="🔴 멈춤/지연"; }
  else if (d.paused){ $("status").className="badge"; $("status").style.cssText="background:rgba(224,160,48,.15);color:#e0a030"; $("status").textContent="⏸ 일시정지(새 진입 차단)"; }
  else { $("status").className="badge ok"; $("status").style.cssText=""; $("status").textContent="🟢 정상"; }
  $("updated").textContent = `갱신 ${fmtT(d.updatedAt)} (${Math.round(age/1000)}s 전)`;
  const gs = $("grStatusBar");                         // 가드레일 발동 상태(설정은 /settings)
  if (gs) gs.innerHTML = d.guardrail
      ? `<div class="pos" style="border-color:var(--down)"><span class="fresh-r">🛡 가드레일 발동 중 — ${d.guardrail} (새 진입 차단)</span> <a href="/settings" class="sub">설정 →</a></div>`
      : "";

  // 원장에서 전체 매매기록·통계 조회(대시보드 표시는 스냅샷 아닌 영구 원장 기준)
  const mode = d.mode || "paper";
  let led = [], st = null;
  try { led = ((await (await fetch(`/api/trades?mode=${mode}`,{cache:"no-store"})).json()).trades)||[]; } catch(e){}
  try { st = await (await fetch(`/api/stats?mode=${mode}`,{cache:"no-store"})).json(); } catch(e){}

  // ── 라이브 영역(매 틱 갱신): 카드 + 현재 포지션 ──
  const retCls = d.returnPct>=0 ? "g" : "r";
  const pos = d.position;
  const posCls = pos ? (pos.side>0?"g":"r") : "";
  let live = `<div class="cards">
    <div class="card"><div class="k">잔고</div><div class="v">${fmt(d.equity)}</div></div>
    <div class="card"><div class="k">수익률</div><div class="v ${retCls}">${d.returnPct>=0?"+":""}${fmt(d.returnPct)}%</div></div>
    <div class="card"><div class="k">포지션</div><div class="v ${posCls}">${pos?(pos.side>0?"롱":"숏"):"없음"}</div></div>
    <div class="card"><div class="k">총 거래</div><div class="v">${st?st.n:d.numTrades}</div></div>
  </div>`;
  if (pos){
    live += `<div class="pos"><h3>현재 포지션</h3><div class="posgrid">
      <div><div class="k">방향</div><div class="v ${posCls}">${pos.side>0?"롱 LONG":"숏 SHORT"}</div></div>
      <div><div class="k">진입가</div><div class="v">${fmt(pos.entryPrice)}</div></div>
      <div><div class="k">수량</div><div class="v">${fmt(pos.qty)}</div></div>
      <div><div class="k">레버리지</div><div class="v">${pos.leverage}x</div></div>
      <div><div class="k">손절</div><div class="v">${pos.stop==null?"–":fmt(pos.stop)}</div></div>
      <div><div class="k">익절</div><div class="v">${pos.tp==null?"–":fmt(pos.tp)}</div></div>
      <div><div class="k">청산가</div><div class="v r">${fmt(pos.liq)}</div></div>
      <div><div class="k">진입시각</div><div class="v">${fmtT(pos.entryTime)}</div></div>
    </div></div>`;
  }

  if (!$("live")) $("body").innerHTML = '<div id="live"></div><div id="history"></div>';
  $("live").innerHTML = live;

  // ── 히스토리 영역: 거래 수가 바뀔 때만 재구성(펼쳐둔 차트가 새로고침에 안 사라지게) ──
  if (led.length !== window._lastTradeN){
    window._lastTradeN = led.length;
    let html = "";
    if (st && st.n){
      html += `<div class="pos"><h3>성과 통계 <span class="sub">원장 ${st.n}건</span></h3><div class="posgrid">
        <div><div class="k">승률</div><div class="v">${st.winRate}%</div></div>
        <div><div class="k">손익비 PF</div><div class="v">${st.profitFactor}</div></div>
        <div><div class="k">총손익</div><div class="v ${st.totalPnl>=0?'g':'r'}">${st.totalPnl>=0?'+':''}${fmt(st.totalPnl)}</div></div>
        <div><div class="k">최대낙폭 MDD</div><div class="v r">-${fmt(st.maxDrawdown)}</div></div>
        <div><div class="k">평균손익</div><div class="v ${st.avgPnl>=0?'g':'r'}">${st.avgPnl>=0?'+':''}${fmt(st.avgPnl)}</div></div>
      </div>`;
      if (st.byStrategy && st.byStrategy.length>1){
        html += `<h3 style="margin:14px 0 8px">전략별 성과</h3><table><thead><tr><th>전략</th><th>거래</th><th>승률</th><th>총손익</th><th>PF</th></tr></thead><tbody>`;
        for (const b of st.byStrategy){
          const nm=(b.strategy||'-').split('/').pop().replace('.json','');
          html += `<tr><td>${nm}</td><td>${b.n}</td><td>${b.winRate}%</td>`
            + `<td class="${b.totalPnl>=0?'g':'r'}">${b.totalPnl>=0?'+':''}${fmt(b.totalPnl)}</td><td>${b.profitFactor}</td></tr>`;
        }
        html += `</tbody></table>`;
      }
      html += `</div>`;
    }
    html += `<div class="pos"><h3>자산 곡선</h3><canvas id="eq"></canvas></div>`;

    html += `<div class="trades pos"><h3>매매 기록 <span class="sub">${led.length}건 · 원장 · 행 클릭 시 차트</span></h3>`
      + `<div id="tradetable"></div><div id="tradepager" class="pager"></div></div>`;
    $("history").innerHTML = html;
    window._led = led;
    window._tradePage = 0;                 // 새 거래 생기면 최신(1쪽)부터
    renderTrades();
    drawEquity(d.initialEquity, led);
  }
}

const PER_PAGE = 50;                        // 매매기록 한 쪽당 건수
function renderTrades(){
  const led = window._led || [];
  const trs = led.slice().reverse();       // 최신 먼저
  const tbl = document.getElementById("tradetable");
  const pg = document.getElementById("tradepager");
  if (!tbl) return;
  if (!trs.length){ tbl.innerHTML = `<div class="empty">아직 매매 기록 없음</div>`; if(pg) pg.innerHTML=""; return; }
  const pages = Math.max(1, Math.ceil(trs.length / PER_PAGE));
  let page = Math.min(Math.max(window._tradePage||0, 0), pages-1);
  window._tradePage = page;
  const slice = trs.slice(page*PER_PAGE, page*PER_PAGE + PER_PAGE);

  let h = `<table><thead><tr><th></th><th>방향</th><th>전략</th><th>진입</th><th>청산</th><th>사유</th><th>손익</th><th>시각</th></tr></thead><tbody>`;
  for (const t of slice){
    const c = t.pnl>=0?"g":"r";
    const nm=(t.strategy||'-').split('/').pop().replace('.json','');
    h += `<tr class="trow" onclick="toggleTrade(${t.id})"><td class="cursor">▸</td>`
      + `<td class="${t.side>0?'g':'r'}">${t.side>0?"롱":"숏"}</td>`
      + `<td class="sub">${nm}</td><td>${fmt(t.entry_price)}</td><td>${fmt(t.exit_price)}</td>`
      + `<td>${RN[t.reason]||t.reason}</td><td class="${c}">${t.pnl>=0?"+":""}${fmt(t.pnl)}</td>`
      + `<td class="sub">${fmtT(t.exit_time)}</td></tr>`
      + `<tr class="exprow" id="exp-${t.id}" style="display:none"><td colspan="8"><div class="tchart" id="tc-${t.id}"></div></td></tr>`;
  }
  h += `</tbody></table>`;
  tbl.innerHTML = h;

  const from = page*PER_PAGE+1, to = page*PER_PAGE+slice.length;
  if (pg) pg.innerHTML = `<button ${page<=0?'disabled':''} onclick="gotoTradePage(${page-1})">‹ 이전</button>`
    + `<span class="sub">${from}–${to} / ${trs.length}건 · ${page+1}/${pages}쪽</span>`
    + `<button ${page>=pages-1?'disabled':''} onclick="gotoTradePage(${page+1})">다음 ›</button>`;
}
function gotoTradePage(n){
  window._charts = window._charts || {};   // 페이지 이동 → 펼친 차트 정리(DOM 교체됨)
  for (const id in window._charts){ try{window._charts[id].remove();}catch(e){} delete window._charts[id]; }
  window._tradePage = n;
  renderTrades();
}

// 매매기록 행 펼치기 → 진입~청산 캔들+지표 차트
window._charts = {};
async function toggleTrade(id){
  const row = document.getElementById("exp-"+id);
  if (!row) return;
  const caret = document.querySelector(`.trow[onclick="toggleTrade(${id})"] .cursor`);
  if (row.style.display !== "none"){   // 접기
    row.style.display = "none";
    if (caret) caret.textContent = "▸";
    if (window._charts[id]){ try{window._charts[id].remove();}catch(e){} delete window._charts[id]; }
    return;
  }
  row.style.display = "";
  if (caret) caret.textContent = "▾";
  const cont = document.getElementById("tc-"+id);
  cont.innerHTML = `<div class="caption">차트 불러오는 중…</div>`;
  const mode = (window._lastState && window._lastState.mode) || "paper";
  try {
    const data = await (await fetch(`/api/trade_chart?id=${id}&mode=${mode}`,{cache:"no-store"})).json();
    if (data.error){ cont.innerHTML = `<div class="err">${data.error}</div>`; return; }
    cont.innerHTML = "";
    window._charts[id] = drawTradeChart(cont, data);
  } catch(e){ cont.innerHTML = `<div class="err">차트 실패: ${e}</div>`; }
}

function drawTradeChart(box, d){
  const LC = window.LightweightCharts;
  if (!LC){ box.innerHTML = `<div class="err">차트 라이브러리 로드 실패</div>`; return null; }
  const inds = d.indicators || [];
  const cap = document.createElement("div");
  cap.className = "caption";
  const nm = (d.strategy||'').split('/').pop().replace('.json','');
  cap.innerHTML = `<b>${nm}</b> · ${d.symbol} ${d.timeframe} · ${d.entry.side>0?"롱":"숏"} `
    + `${fmt(d.entry.price)} → ${fmt(d.exit.price)} · ${RN[d.exit.reason]||d.exit.reason} `
    + `<b class="${d.exit.pnl>=0?'g':'r'}">${d.exit.pnl>=0?'+':''}${fmt(d.exit.pnl)}</b>`;
  box.appendChild(cap);
  const holder = document.createElement("div");
  const oscPanes = new Set(inds.filter(i=>!i.overlay).map(i=>i.pane)).size;
  holder.style.height = (280 + oscPanes*100) + "px";
  box.appendChild(holder);

  const chart = LC.createChart(holder, {
    autoSize: true,
    layout: { background:{color:"transparent"}, textColor:"#8a90a0", fontFamily:"system-ui, sans-serif", attributionLogo:false },
    grid: { vertLines:{color:"rgba(255,255,255,.05)"}, horzLines:{color:"rgba(255,255,255,.05)"} },
    crosshair: { mode: LC.CrosshairMode.Normal },
    rightPriceScale: { borderColor:"rgba(255,255,255,.10)" },
    timeScale: { borderColor:"rgba(255,255,255,.10)", timeVisible:true, secondsVisible:false },
    localization: { timeFormatter: s => fmtT(s*1000) },
  });
  const candles = chart.addSeries(LC.CandlestickSeries, {
    upColor:"#3aa76d", downColor:"#cf5b5b", borderVisible:false, wickUpColor:"#3aa76d", wickDownColor:"#cf5b5b" });
  candles.setData(d.ohlc.map(b => ({ time:b[0]/1000, open:b[1], high:b[2], low:b[3], close:b[4] })));

  const ohlc = d.ohlc, nn = ohlc.length;
  const snap = t => { let a=0,b=nn-1,r=0; while(a<=b){ const m=(a+b)>>1; if(ohlc[m][0]<=t){r=m;a=m+1;}else b=m-1; } return ohlc[r][0]/1000; };
  const win = d.exit.pnl > 0;
  const mk = [
    { time:snap(d.entry.time), position:d.entry.side>0?"belowBar":"aboveBar", color:"#4c9be8",
      shape:d.entry.side>0?"arrowUp":"arrowDown", text:(d.entry.side>0?"롱 진입":"숏 진입") },
    { time:snap(d.exit.time), position:d.entry.side>0?"aboveBar":"belowBar", color:win?"#26d07c":"#ff5c6c",
      shape:"circle", text:(d.exit.pnl>0?"+":"")+fmt(d.exit.pnl) },
  ].sort((a,b)=>a.time-b.time);
  LC.createSeriesMarkers(candles, mk);

  const te = snap(d.entry.time), tx = snap(d.exit.time);
  if (tx > te){
    for (const [pr,color] of [[d.entry.price,"rgba(76,155,232,.7)"],[d.exit.price, win?"rgba(38,208,124,.7)":"rgba(255,92,108,.7)"]]){
      const s = chart.addSeries(LC.LineSeries, { color, lineWidth:1, lineStyle:LC.LineStyle.Dashed,
        priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false });
      s.setData([{ time:te, value:pr }, { time:tx, value:pr }]);
    }
  }

  const paneOf = {}; let nextPane = 1;
  for (const ind of inds){
    let pane = 0;
    if (!ind.overlay){ if (!(ind.pane in paneOf)) paneOf[ind.pane] = nextPane++; pane = paneOf[ind.pane]; }
    if (ind.type === "histogram"){
      const s = chart.addSeries(LC.HistogramSeries, { color:ind.color, priceLineVisible:false, lastValueVisible:false }, pane);
      s.setData(ind.data.filter(p=>p[1]!=null).map(p => p[2] ? {time:p[0]/1000,value:p[1],color:p[2]} : {time:p[0]/1000,value:p[1]}));
    } else {
      const opt = { color:ind.color, lineWidth:ind.overlay?2:1, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false, pointMarkersVisible:false };
      let run = [];
      const flush = () => { if (run.length){ const s = chart.addSeries(LC.LineSeries, opt, pane); s.setData(run); run=[]; } };
      for (const p of ind.data){ if (p[1]==null) flush(); else run.push({ time:p[0]/1000, value:p[1] }); }
      flush();
    }
  }
  try { const panes = chart.panes(); if (panes.length>1){ panes[0].setStretchFactor(3); for (let i=1;i<panes.length;i++) panes[i].setStretchFactor(1); } } catch(e){}
  chart.timeScale().fitContent();
  return chart;
}

function drawEquity(initial, trades){
  const cv = $("eq"); if (!cv) return;
  const dpr = window.devicePixelRatio||1, W=cv.clientWidth, H=120;
  cv.width=W*dpr; cv.height=H*dpr; const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  let eq=initial; const pts=[eq];
  for (const t of (trades||[])) { eq+=t.pnl; pts.push(eq); }
  if (pts.length<2){ ctx.fillStyle="#8a90a0"; ctx.fillText("데이터 부족", 10, 60); return; }
  const mn=Math.min(...pts), mx=Math.max(...pts), rng=(mx-mn)||1;
  const x=i=>i/(pts.length-1)*(W-8)+4, y=v=>H-8-((v-mn)/rng)*(H-16);
  ctx.beginPath(); ctx.moveTo(x(0),y(pts[0]));
  for (let i=1;i<pts.length;i++) ctx.lineTo(x(i),y(pts[i]));
  ctx.strokeStyle = pts[pts.length-1]>=pts[0] ? "#26d07c" : "#ff5c6c"; ctx.lineWidth=2; ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,.12)"; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(4,y(initial)); ctx.lineTo(W-4,y(initial)); ctx.stroke(); ctx.setLineDash([]);
}

// ── 봇 설정 (프리셋의 timeframe·진입·청산만 쓰고 나머지는 여기서 재설정) ──
// tick(3초)이 폼을 지우지 않게 별도 #botcfg에 1회 렌더(저장/초기화 때만 다시 그림).
// 드롭다운은 네이티브 <select>(흰 팝업) 대신 .combo/.dropdown 다크 컴포넌트 재사용.
const _picks = {};                                  // 커스텀 드롭다운 선택값 (id → value, ""=프리셋 기본)
// 표시용 한국어 라벨. **저장되는 값은 스키마 값 그대로**(equityPercent 등) — 라벨만 바꾼다.
const LABEL = {
  equityPercent: "자본 % (증거금 비율)",
  riskPercent:   "리스크 % (손절까지 잃을 비율)",
  fixedQuote:    "고정 금액 (USDT/USDC)",
  fixedBase:     "고정 수량 (코인 개수)",
  isolated:      "격리 (isolated)",
  cross:         "교차 (cross)",
  taker:         "시장가 (taker)",
  makerLimit:    "지정가 (maker · 수수료 낮음)",
};
const label = v => LABEL[v] || v;                   // 매핑 없으면(심볼 등) 원값 그대로
function pickerHTML(id, options, cur, defLabel){
  _picks[id] = cur || "";
  const defOpt = `— 프리셋${defLabel!=null&&defLabel!==""?` (${label(defLabel)})`:""} —`;
  const rows = [`<div class="opt" data-v="">${defOpt}</div>`].concat(
    options.map(o => `<div class="opt${o===cur?" active":""}" data-v="${o}">${label(o)}</div>`)).join("");
  return `<div class="combo" style="max-width:230px"><div class="syminput" id="${id}_disp"`
    + ` onclick="togglePicker('${id}')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">`
    + `<span>${cur ? label(cur) : defOpt}</span><span class="sub">▾</span></div>`
    + `<div class="dropdown" id="${id}_dd" style="display:none">${rows}</div></div>`;
}
function togglePicker(id){
  document.querySelectorAll(".dropdown").forEach(d => { if (d.id !== id+"_dd") d.style.display="none"; });
  window._stratOpen = false;
  const dd = $(id+"_dd"); if (dd) dd.style.display = dd.style.display==="none" ? "" : "none";
}
function _wirePickers(){
  document.querySelectorAll("#botcfg .dropdown").forEach(dd => {
    const id = dd.id.replace(/_dd$/,"");
    dd.querySelectorAll(".opt").forEach(o => o.addEventListener("mousedown", e => {
      e.preventDefault();                           // blur보다 먼저 → 선택 반영
      _picks[id] = o.dataset.v;                     // 저장값은 스키마 값 그대로
      // 표시는 한국어 라벨로(o.textContent 는 이미 라벨). 원값을 쓰면 선택 순간 영어로 되돌아간다.
      $(id+"_disp").querySelector("span").textContent = o.textContent;
      dd.style.display = "none";
    }));
  });
}
document.addEventListener("click", e => {           // 바깥 클릭 시 모든 커스텀 드롭다운 닫기
  if (!e.target.closest(".combo")) {
    document.querySelectorAll(".dropdown").forEach(d => d.style.display="none");
    window._stratOpen = false;
  }
});

async function loadBotConfig(){
  let d, cache = [];
  try { d = await (await fetch("/api/bot-config",{cache:"no-store"})).json(); }
  catch(e){ $("botcfg").innerHTML = `<div class="err">봇 설정 로드 실패: ${e}</div>`; return; }
  try { cache = ((await (await fetch("/api/cache",{cache:"no-store"})).json()).symbols||[]).map(s=>s.symbol); } catch(e){}
  let tiers = [];
  try { tiers = ((await (await fetch("/api/settings",{cache:"no-store"})).json()).leverageTiers)||[]; } catch(e){}
  window._levTiers = tiers.map(t => ({maxBalance: t.maxBalance, leverage: t.leverage}));
  const c = d.config || {}, def = d.presetDefaults || {};
  const szc = c.sizing || {}, szd = def.sizing || {}, fc = c.filter || {}, fd = def.filter || {};
  const sizeC = szc.size || {}, sizeD = szd.size || {};
  const ph = v => v==null ? "" : v;
  const dyn = c.useDynamicLeverage === true;
  const symOpts = cache.slice();                    // 심볼 = 수집된(캐시) 심볼만
  if (c.symbol && !symOpts.includes(c.symbol)) symOpts.unshift(c.symbol);
  $("botcfg").innerHTML =
      `<h3>⚙️ 봇 설정 <span class="sub">프리셋의 <b>timeframe·진입·청산</b>만 사용 · 아래로 심볼·리스크 재설정 (프리셋 기본 = 빈값)</span></h3>`
    + `<div class="field"><label>심볼</label>${pickerHTML("bc_sym", symOpts, c.symbol||"", def.symbol)}`
    +   (cache.length ? "" : `<span class="sub">수집된 심볼 없음 — /collector에서 먼저 수집</span>`) + `</div>`
    + `<div class="field"><label>레버리지</label><label style="display:flex;align-items:center;gap:6px;cursor:pointer">`
    +   `<input type="checkbox" id="bc_dyn" ${dyn?"checked":""} onchange="toggleDynLev()"> 동적 레버리지 사용(잔고별 티어)</label></div>`
    + `<div class="field" id="bc_levfixed" style="display:${dyn?"none":""}"><label></label>`
    +   `<input id="bc_lev" type="number" min="1" placeholder="${ph(szd.leverage)}" value="${ph(szc.leverage)}"><span class="sub">고정 레버리지</span></div>`
    + `<div id="bc_tiers" style="display:${dyn?"":"none"};margin:2px 0 8px"></div>`
    + `<div class="field"><label>증거금 방식</label>${pickerHTML("bc_margin",["isolated","cross"],szc.marginMode||"",szd.marginMode)}</div>`
    + `<div class="field"><label>주문 크기</label>${pickerHTML("bc_sizetype",["equityPercent","riskPercent","fixedQuote","fixedBase"],sizeC.type||"",sizeD.type)}`
    +   `<input id="bc_sizeval" type="number" step="any" style="max-width:110px" placeholder="${ph(sizeD.value)}" value="${ph(sizeC.value)}"></div>`
    + `<div class="field"><label>진입 체결</label>${pickerHTML("bc_exec",["taker","makerLimit"],(c.execution||{}).entryType||"",(def.execution||{}).entryType)}</div>`
    + `<div class="field"><label>쿨다운(봉)</label><input id="bc_cd" type="number" min="0" placeholder="${ph(fd.cooldownBars)}" value="${ph(fc.cooldownBars)}"></div>`
    + `<div class="field"><label>펀딩회피(분)</label><input id="bc_fund" type="number" min="0" placeholder="${ph(fd.avoidFundingWindowMinutes)}" value="${ph(fc.avoidFundingWindowMinutes)}"></div>`
    + `<div style="margin-top:10px;display:flex;gap:8px;align-items:center">`
    +   `<button class="btn-go" onclick="saveBotConfig()">저장</button>`
    +   `<button onclick="resetBotConfig()" style="padding:7px 12px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);color:var(--fg);cursor:pointer">프리셋 기본값 사용(초기화)</button>`
    +   `<span class="sub" id="bc_msg"></span></div>`
    + `<div class="sub" style="margin-top:8px">무포지션일 때 다음 폴링에 반영(포지션 있으면 청산 후). 설정 안 한 항목은 프리셋 값 사용.</div>`;
  _wirePickers();
  renderTiers();
}
// 티어 '편집'은 /settings 로 옮겼다(글로벌 값이라 백테스트와 공유). 여기선 현재 값 요약만 보여준다.
function renderTiers(){
  const box = document.getElementById("bc_tiers"); if (!box) return;
  const t = window._levTiers || [];
  const summary = t.length
      ? t.map(x => `${x.maxBalance==null ? "그 이상" : "≤$"+Number(x.maxBalance).toLocaleString()} → ${x.leverage}x`).join(" · ")
      : "티어 없음 — 프리셋의 고정 레버리지를 사용";
  box.innerHTML = `<div class="sub" style="margin-bottom:2px">잔고별 레버리지 티어 <b>(글로벌)</b></div>`
    + `<div class="field"><span>${summary}</span><a href="/settings" class="sub">설정에서 편집 →</a></div>`;
}

function toggleDynLev(){
  const dyn = document.getElementById("bc_dyn").checked;
  document.getElementById("bc_levfixed").style.display = dyn ? "none" : "";
  document.getElementById("bc_tiers").style.display = dyn ? "" : "none";
}
function _num(id){ const v = ($(id).value||"").trim(); return v==="" ? null : Number(v); }
async function saveBotConfig(){
  const cfg = {};
  const sym = (_picks.bc_sym||"").toUpperCase().replace(/[^A-Z0-9]/g,""); if (sym) cfg.symbol = sym;
  const sizing = {};
  const dyn = $("bc_dyn") && $("bc_dyn").checked;
  cfg.useDynamicLeverage = !!dyn;                   // 동적 on/off는 항상 명시
  if (!dyn){ const lev = _num("bc_lev"); if (lev!=null) sizing.leverage = lev; }
  const mm = _picks.bc_margin; if (mm) sizing.marginMode = mm;
  const st = _picks.bc_sizetype, sv = _num("bc_sizeval");
  if (st && sv!=null) sizing.size = { type: st, value: sv };
  if (Object.keys(sizing).length) cfg.sizing = sizing;
  const et = _picks.bc_exec; if (et) cfg.execution = { entryType: et };
  const filter = {};
  const cd = _num("bc_cd"); if (cd!=null) filter.cooldownBars = cd;
  const fw = _num("bc_fund"); if (fw!=null) filter.avoidFundingWindowMinutes = fw;
  if (Object.keys(filter).length) cfg.filter = filter;
  $("bc_msg").textContent = "저장 중…";
  try {
    // 티어 자체는 여기서 저장하지 않는다 — /settings 에서 편집한다.
    // (여기서도 쓰면 이 화면이 들고 있던 낡은 값으로 방금 설정에서 바꾼 티어를 되돌려버린다.)
    const r = await (await fetch("/api/bot-config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({config:cfg})})).json();
    if (r.error) throw new Error(r.error);
    $("bc_msg").innerHTML = `<span class="fresh-g">✓ 저장됨 (${Object.keys(cfg).length?'오버라이드 '+Object.keys(cfg).join('/'):'비움 → 프리셋 그대로'})</span>`;
  } catch(e){ $("bc_msg").innerHTML = `<span class="fresh-r">저장 실패: ${e.message}</span>`; }
}
async function resetBotConfig(){
  if (!confirm("봇 설정을 비우고 프리셋 값을 그대로 쓰게 합니다. 진행할까요?")) return;
  try { await fetch("/api/bot-config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({config:{}})}); }
  catch(e){ alert("초기화 실패: "+e); }
  loadBotConfig();
}

// 가드레일·레버리지 티어 '설정'은 /settings 페이지로 옮겼다(계좌 전역 설정이라 성격이 다름).
// 여기 남는 건 '지금 발동 중인가'라는 모니터링 뿐 — tick()의 grStatus 표시.

loadStrategies().then(tick); setInterval(tick, 3000);   // 전략 목록 로드 후 3초마다 새로고침
loadBotConfig();                                        // 봇 설정 패널 1회 렌더(tick과 분리)
</script>

  if (window.__NO_STUDIO__) { const a = document.getElementById("studioLink"); if (a) a.style.display = "none"; }
