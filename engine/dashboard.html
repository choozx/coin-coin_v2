<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>매매 대시보드</title>
<style>
  :root { --bg:#0e1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3140; --fg:#e6e9ef; --mut:#8a90a0;
          --up:#26d07c; --down:#ff5c6c; --blue:#4c9be8; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font-family:system-ui,-apple-system,sans-serif; }
  .wrap { max-width:1000px; margin:0 auto; padding:20px; }
  header { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  h1 { font-size:18px; margin:0; }
  .badge { padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
  .ok { background:rgba(38,208,124,.15); color:var(--up); }
  .stale { background:rgba(255,92,108,.15); color:var(--down); }
  .sub { color:var(--mut); font-size:13px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .card .k { color:var(--mut); font-size:12px; margin-bottom:6px; }
  .card .v { font-size:24px; font-weight:700; }
  .pos { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:16px; }
  .pos h3, .trades h3 { margin:0 0 10px; font-size:14px; color:var(--mut); font-weight:600; }
  .posgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; }
  .posgrid .k { color:var(--mut); font-size:11px; } .posgrid .v { font-size:15px; font-weight:600; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:right; padding:6px 8px; border-bottom:1px solid var(--line); }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--mut); font-weight:600; font-size:12px; }
  .g { color:var(--up); } .r { color:var(--down); }
  canvas { width:100%; height:120px; display:block; }
  .empty { color:var(--mut); padding:20px; text-align:center; }
  .err { background:rgba(255,92,108,.1); border:1px solid var(--down); color:var(--down);
         padding:12px; border-radius:8px; }
  .ctrlbar { display:flex; gap:16px; flex-wrap:wrap; background:var(--panel); border:1px solid var(--line);
             border-radius:10px; padding:10px 14px; margin-bottom:16px; }
  .svc { display:flex; align-items:center; gap:8px; font-size:13px; }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.r { background:var(--up); } .dot.p { background:#e0a030; }
  .svc button { padding:4px 12px; border-radius:6px; border:1px solid var(--line); background:var(--panel2);
                color:var(--fg); cursor:pointer; font-size:12px; }
  .svc button:hover { border-color:var(--blue); }
  .svc select { background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:6px;
                padding:4px 8px; font-size:12px; cursor:pointer; max-width:260px; }
  .svc select:hover { border-color:var(--blue); }
  .trow { cursor:pointer; }
  .trow:hover td { background:rgba(255,255,255,.04); }
  .trow .cursor { color:var(--mut); font-size:10px; }
  .exprow > td { padding:0; background:var(--panel2); border-bottom:1px solid var(--line); }
  .tchart { width:100%; padding:8px 4px; }
  .tchart .caption { color:var(--mut); font-size:12px; padding:4px 6px 8px; }
  .pager { display:flex; align-items:center; justify-content:center; gap:14px; padding:12px 0 2px; }
  .pager button { padding:5px 14px; border-radius:6px; border:1px solid var(--line); background:var(--panel2);
                  color:var(--fg); cursor:pointer; font-size:13px; }
  .pager button:hover:not(:disabled) { border-color:var(--blue); }
  .pager button:disabled { opacity:.4; cursor:default; }
</style>
</head>
<body>
<script src="/vendor/lightweight-charts.js"></script>
<div class="wrap">
  <header>
    <h1 id="title">매매 대시보드</h1>
    <a href="/" style="color:var(--blue);text-decoration:none;font-size:13px">🔬 백테스트</a>
    <span class="badge" id="status">…</span>
    <span class="sub" id="meta"></span>
    <span class="sub" style="margin-left:auto" id="updated"></span>
  </header>
  <div id="control" class="ctrlbar"></div>
  <div id="body"><div class="empty">상태 불러오는 중…</div></div>
</div>
<script>
const $ = id => document.getElementById(id);
const fmt = n => n==null ? "–" : Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
const fmtT = ms => { const d=new Date(ms); return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); };
const RN = {take_profit:"익절", stop_loss:"손절", trailing:"트레일링", signal:"신호청산", time:"시간청산", supertrend:"ST전환", liquidation:"강제청산"};

function svcBtn(svc, label, state){
  const paused = state === "paused";
  return `<span class="svc"><b>${label}</b> <span class="dot ${paused?'p':'r'}"></span>${paused?'멈춤':'실행중'} `
    + `<button onclick="setSvc('${svc}','${paused?'running':'paused'}')">${paused?'▶ 재개':'⏸ 멈춤'}</button></span>`;
}
let STRATS = [];
async function loadStrategies(){
  try { STRATS = ((await (await fetch("/api/strategies",{cache:"no-store"})).json()).strategies)||[]; } catch(e){}
}
function stratSelector(d){
  if (!STRATS.length) return "";
  const active = d && d.strategy;
  const pending = d && d.pendingStrategy && d.pendingStrategy!==active ? d.pendingStrategy : null;
  const opts = STRATS.map(s=>{
    const mark = s.source==="saved" ? "📁 " : "";
    return `<option value="${s.path}"${s.path===active?" selected":""}>${mark}${s.name} · ${s.symbol} ${s.timeframe}</option>`;
  }).join("");
  let html = `<span class="svc"><b>전략</b> <select id="stratSel" onchange="setStrat(this.value)">${opts}</select></span>`;
  if (pending){
    const pn = (STRATS.find(s=>s.path===pending)||{}).name || pending;
    html += `<span class="svc" style="color:#e0a030">⏳ 전환 대기: <b>${pn}</b> <span class="sub">포지션 청산 후 적용</span></span>`;
  }
  if (d && d.strategyError) html += `<span class="svc" style="color:var(--down)">⚠ ${d.strategyError}</span>`;
  return html;
}
async function setStrat(path){
  try {
    const r = await (await fetch("/api/strategy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path})})).json();
    if (r && r.error) alert("전략 선택 실패: "+r.error);
  } catch(e){ alert("전략 선택 실패: "+e); }
}
async function renderControl(d){
  let c = {};
  try { c = await (await fetch("/api/control",{cache:"no-store"})).json(); } catch(e){}
  $("control").innerHTML = svcBtn("trader","봇", c.trader||"running") + svcBtn("collector","수집기", c.collector||"running") + stratSelector(d);
}
async function setSvc(svc, state){
  try { await fetch("/api/control",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({service:svc,state})}); }
  catch(e){ alert("제어 실패: "+e); }
  renderControl(window._lastState);
}

async function tick(){
  let d;
  try { d = await (await fetch("/api/state",{cache:"no-store"})).json(); }
  catch(e){ renderControl(null); window._lastTradeN=-1; $("body").innerHTML = `<div class="err">상태 서버 응답 없음: ${e}</div>`; return; }
  window._lastState = d;
  renderControl(d);
  if (d.error){ window._lastTradeN=-1; $("body").innerHTML = `<div class="err">${d.error}</div>`; $("status").className="badge stale"; $("status").textContent="대기"; return; }

  $("title").textContent = `${d.preset} · ${d.symbol} ${d.timeframe}`;
  $("meta").textContent = `초기 ${fmt(d.initialEquity)} · ${d.mode==='live'?'실거래':'페이퍼'}`;
  const age = Date.now() - d.updatedAt;
  const alive = age < 3*60*1000;    // 3분 내 갱신이면 정상
  if (!alive){ $("status").className="badge stale"; $("status").textContent="🔴 멈춤/지연"; }
  else if (d.paused){ $("status").className="badge"; $("status").style.cssText="background:rgba(224,160,48,.15);color:#e0a030"; $("status").textContent="⏸ 일시정지(새 진입 차단)"; }
  else { $("status").className="badge ok"; $("status").style.cssText=""; $("status").textContent="🟢 정상"; }
  $("updated").textContent = `갱신 ${fmtT(d.updatedAt)} (${Math.round(age/1000)}s 전)`;

  // 원장에서 전체 매매기록·통계 조회(대시보드 표시는 스냅샷 아닌 영구 원장 기준)
  const mode = d.mode || "paper";
  let led = [], st = null;
  try { led = ((await (await fetch(`/api/trades?mode=${mode}`,{cache:"no-store"})).json()).trades)||[]; } catch(e){}
  try { st = await (await fetch(`/api/stats?mode=${mode}`,{cache:"no-store"})).json(); } catch(e){}

  // ── 라이브 영역(매 틱 갱신): 카드 + 현재 포지션 ──
  const retCls = d.returnPct>=0 ? "g" : "r";
  const pos = d.position;
  const posCls = pos ? (pos.side>0?"g":"r") : "";
  let live = `<div class="cards">
    <div class="card"><div class="k">잔고</div><div class="v">${fmt(d.equity)}</div></div>
    <div class="card"><div class="k">수익률</div><div class="v ${retCls}">${d.returnPct>=0?"+":""}${fmt(d.returnPct)}%</div></div>
    <div class="card"><div class="k">포지션</div><div class="v ${posCls}">${pos?(pos.side>0?"롱":"숏"):"없음"}</div></div>
    <div class="card"><div class="k">총 거래</div><div class="v">${st?st.n:d.numTrades}</div></div>
  </div>`;
  if (pos){
    live += `<div class="pos"><h3>현재 포지션</h3><div class="posgrid">
      <div><div class="k">방향</div><div class="v ${posCls}">${pos.side>0?"롱 LONG":"숏 SHORT"}</div></div>
      <div><div class="k">진입가</div><div class="v">${fmt(pos.entryPrice)}</div></div>
      <div><div class="k">수량</div><div class="v">${fmt(pos.qty)}</div></div>
      <div><div class="k">레버리지</div><div class="v">${pos.leverage}x</div></div>
      <div><div class="k">손절</div><div class="v">${pos.stop==null?"–":fmt(pos.stop)}</div></div>
      <div><div class="k">익절</div><div class="v">${pos.tp==null?"–":fmt(pos.tp)}</div></div>
      <div><div class="k">청산가</div><div class="v r">${fmt(pos.liq)}</div></div>
      <div><div class="k">진입시각</div><div class="v">${fmtT(pos.entryTime)}</div></div>
    </div></div>`;
  }

  if (!$("live")) $("body").innerHTML = '<div id="live"></div><div id="history"></div>';
  $("live").innerHTML = live;

  // ── 히스토리 영역: 거래 수가 바뀔 때만 재구성(펼쳐둔 차트가 새로고침에 안 사라지게) ──
  if (led.length !== window._lastTradeN){
    window._lastTradeN = led.length;
    let html = "";
    if (st && st.n){
      html += `<div class="pos"><h3>성과 통계 <span class="sub">원장 ${st.n}건</span></h3><div class="posgrid">
        <div><div class="k">승률</div><div class="v">${st.winRate}%</div></div>
        <div><div class="k">손익비 PF</div><div class="v">${st.profitFactor}</div></div>
        <div><div class="k">총손익</div><div class="v ${st.totalPnl>=0?'g':'r'}">${st.totalPnl>=0?'+':''}${fmt(st.totalPnl)}</div></div>
        <div><div class="k">최대낙폭 MDD</div><div class="v r">-${fmt(st.maxDrawdown)}</div></div>
        <div><div class="k">평균손익</div><div class="v ${st.avgPnl>=0?'g':'r'}">${st.avgPnl>=0?'+':''}${fmt(st.avgPnl)}</div></div>
      </div>`;
      if (st.byStrategy && st.byStrategy.length>1){
        html += `<h3 style="margin:14px 0 8px">전략별 성과</h3><table><thead><tr><th>전략</th><th>거래</th><th>승률</th><th>총손익</th><th>PF</th></tr></thead><tbody>`;
        for (const b of st.byStrategy){
          const nm=(b.strategy||'-').split('/').pop().replace('.json','');
          html += `<tr><td>${nm}</td><td>${b.n}</td><td>${b.winRate}%</td>`
            + `<td class="${b.totalPnl>=0?'g':'r'}">${b.totalPnl>=0?'+':''}${fmt(b.totalPnl)}</td><td>${b.profitFactor}</td></tr>`;
        }
        html += `</tbody></table>`;
      }
      html += `</div>`;
    }
    html += `<div class="pos"><h3>자산 곡선</h3><canvas id="eq"></canvas></div>`;

    html += `<div class="trades pos"><h3>매매 기록 <span class="sub">${led.length}건 · 원장 · 행 클릭 시 차트</span></h3>`
      + `<div id="tradetable"></div><div id="tradepager" class="pager"></div></div>`;
    $("history").innerHTML = html;
    window._led = led;
    window._tradePage = 0;                 // 새 거래 생기면 최신(1쪽)부터
    renderTrades();
    drawEquity(d.initialEquity, led);
  }
}

const PER_PAGE = 50;                        // 매매기록 한 쪽당 건수
function renderTrades(){
  const led = window._led || [];
  const trs = led.slice().reverse();       // 최신 먼저
  const tbl = document.getElementById("tradetable");
  const pg = document.getElementById("tradepager");
  if (!tbl) return;
  if (!trs.length){ tbl.innerHTML = `<div class="empty">아직 매매 기록 없음</div>`; if(pg) pg.innerHTML=""; return; }
  const pages = Math.max(1, Math.ceil(trs.length / PER_PAGE));
  let page = Math.min(Math.max(window._tradePage||0, 0), pages-1);
  window._tradePage = page;
  const slice = trs.slice(page*PER_PAGE, page*PER_PAGE + PER_PAGE);

  let h = `<table><thead><tr><th></th><th>방향</th><th>전략</th><th>진입</th><th>청산</th><th>사유</th><th>손익</th><th>시각</th></tr></thead><tbody>`;
  for (const t of slice){
    const c = t.pnl>=0?"g":"r";
    const nm=(t.strategy||'-').split('/').pop().replace('.json','');
    h += `<tr class="trow" onclick="toggleTrade(${t.id})"><td class="cursor">▸</td>`
      + `<td class="${t.side>0?'g':'r'}">${t.side>0?"롱":"숏"}</td>`
      + `<td class="sub">${nm}</td><td>${fmt(t.entry_price)}</td><td>${fmt(t.exit_price)}</td>`
      + `<td>${RN[t.reason]||t.reason}</td><td class="${c}">${t.pnl>=0?"+":""}${fmt(t.pnl)}</td>`
      + `<td class="sub">${fmtT(t.exit_time)}</td></tr>`
      + `<tr class="exprow" id="exp-${t.id}" style="display:none"><td colspan="8"><div class="tchart" id="tc-${t.id}"></div></td></tr>`;
  }
  h += `</tbody></table>`;
  tbl.innerHTML = h;

  const from = page*PER_PAGE+1, to = page*PER_PAGE+slice.length;
  if (pg) pg.innerHTML = `<button ${page<=0?'disabled':''} onclick="gotoTradePage(${page-1})">‹ 이전</button>`
    + `<span class="sub">${from}–${to} / ${trs.length}건 · ${page+1}/${pages}쪽</span>`
    + `<button ${page>=pages-1?'disabled':''} onclick="gotoTradePage(${page+1})">다음 ›</button>`;
}
function gotoTradePage(n){
  window._charts = window._charts || {};   // 페이지 이동 → 펼친 차트 정리(DOM 교체됨)
  for (const id in window._charts){ try{window._charts[id].remove();}catch(e){} delete window._charts[id]; }
  window._tradePage = n;
  renderTrades();
}

// 매매기록 행 펼치기 → 진입~청산 캔들+지표 차트
window._charts = {};
async function toggleTrade(id){
  const row = document.getElementById("exp-"+id);
  if (!row) return;
  const caret = document.querySelector(`.trow[onclick="toggleTrade(${id})"] .cursor`);
  if (row.style.display !== "none"){   // 접기
    row.style.display = "none";
    if (caret) caret.textContent = "▸";
    if (window._charts[id]){ try{window._charts[id].remove();}catch(e){} delete window._charts[id]; }
    return;
  }
  row.style.display = "";
  if (caret) caret.textContent = "▾";
  const cont = document.getElementById("tc-"+id);
  cont.innerHTML = `<div class="caption">차트 불러오는 중…</div>`;
  const mode = (window._lastState && window._lastState.mode) || "paper";
  try {
    const data = await (await fetch(`/api/trade_chart?id=${id}&mode=${mode}`,{cache:"no-store"})).json();
    if (data.error){ cont.innerHTML = `<div class="err">${data.error}</div>`; return; }
    cont.innerHTML = "";
    window._charts[id] = drawTradeChart(cont, data);
  } catch(e){ cont.innerHTML = `<div class="err">차트 실패: ${e}</div>`; }
}

function drawTradeChart(box, d){
  const LC = window.LightweightCharts;
  if (!LC){ box.innerHTML = `<div class="err">차트 라이브러리 로드 실패</div>`; return null; }
  const inds = d.indicators || [];
  const cap = document.createElement("div");
  cap.className = "caption";
  const nm = (d.strategy||'').split('/').pop().replace('.json','');
  cap.innerHTML = `<b>${nm}</b> · ${d.symbol} ${d.timeframe} · ${d.entry.side>0?"롱":"숏"} `
    + `${fmt(d.entry.price)} → ${fmt(d.exit.price)} · ${RN[d.exit.reason]||d.exit.reason} `
    + `<b class="${d.exit.pnl>=0?'g':'r'}">${d.exit.pnl>=0?'+':''}${fmt(d.exit.pnl)}</b>`;
  box.appendChild(cap);
  const holder = document.createElement("div");
  const oscPanes = new Set(inds.filter(i=>!i.overlay).map(i=>i.pane)).size;
  holder.style.height = (280 + oscPanes*100) + "px";
  box.appendChild(holder);

  const chart = LC.createChart(holder, {
    autoSize: true,
    layout: { background:{color:"transparent"}, textColor:"#8a90a0", fontFamily:"system-ui, sans-serif", attributionLogo:false },
    grid: { vertLines:{color:"rgba(255,255,255,.05)"}, horzLines:{color:"rgba(255,255,255,.05)"} },
    crosshair: { mode: LC.CrosshairMode.Normal },
    rightPriceScale: { borderColor:"rgba(255,255,255,.10)" },
    timeScale: { borderColor:"rgba(255,255,255,.10)", timeVisible:true, secondsVisible:false },
    localization: { timeFormatter: s => fmtT(s*1000) },
  });
  const candles = chart.addSeries(LC.CandlestickSeries, {
    upColor:"#3aa76d", downColor:"#cf5b5b", borderVisible:false, wickUpColor:"#3aa76d", wickDownColor:"#cf5b5b" });
  candles.setData(d.ohlc.map(b => ({ time:b[0]/1000, open:b[1], high:b[2], low:b[3], close:b[4] })));

  const ohlc = d.ohlc, nn = ohlc.length;
  const snap = t => { let a=0,b=nn-1,r=0; while(a<=b){ const m=(a+b)>>1; if(ohlc[m][0]<=t){r=m;a=m+1;}else b=m-1; } return ohlc[r][0]/1000; };
  const win = d.exit.pnl > 0;
  const mk = [
    { time:snap(d.entry.time), position:d.entry.side>0?"belowBar":"aboveBar", color:"#4c9be8",
      shape:d.entry.side>0?"arrowUp":"arrowDown", text:(d.entry.side>0?"롱 진입":"숏 진입") },
    { time:snap(d.exit.time), position:d.entry.side>0?"aboveBar":"belowBar", color:win?"#26d07c":"#ff5c6c",
      shape:"circle", text:(d.exit.pnl>0?"+":"")+fmt(d.exit.pnl) },
  ].sort((a,b)=>a.time-b.time);
  LC.createSeriesMarkers(candles, mk);

  const te = snap(d.entry.time), tx = snap(d.exit.time);
  if (tx > te){
    for (const [pr,color] of [[d.entry.price,"rgba(76,155,232,.7)"],[d.exit.price, win?"rgba(38,208,124,.7)":"rgba(255,92,108,.7)"]]){
      const s = chart.addSeries(LC.LineSeries, { color, lineWidth:1, lineStyle:LC.LineStyle.Dashed,
        priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false });
      s.setData([{ time:te, value:pr }, { time:tx, value:pr }]);
    }
  }

  const paneOf = {}; let nextPane = 1;
  for (const ind of inds){
    let pane = 0;
    if (!ind.overlay){ if (!(ind.pane in paneOf)) paneOf[ind.pane] = nextPane++; pane = paneOf[ind.pane]; }
    if (ind.type === "histogram"){
      const s = chart.addSeries(LC.HistogramSeries, { color:ind.color, priceLineVisible:false, lastValueVisible:false }, pane);
      s.setData(ind.data.filter(p=>p[1]!=null).map(p => p[2] ? {time:p[0]/1000,value:p[1],color:p[2]} : {time:p[0]/1000,value:p[1]}));
    } else {
      const opt = { color:ind.color, lineWidth:ind.overlay?2:1, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false, pointMarkersVisible:false };
      let run = [];
      const flush = () => { if (run.length){ const s = chart.addSeries(LC.LineSeries, opt, pane); s.setData(run); run=[]; } };
      for (const p of ind.data){ if (p[1]==null) flush(); else run.push({ time:p[0]/1000, value:p[1] }); }
      flush();
    }
  }
  try { const panes = chart.panes(); if (panes.length>1){ panes[0].setStretchFactor(3); for (let i=1;i<panes.length;i++) panes[i].setStretchFactor(1); } } catch(e){}
  chart.timeScale().fitContent();
  return chart;
}

function drawEquity(initial, trades){
  const cv = $("eq"); if (!cv) return;
  const dpr = window.devicePixelRatio||1, W=cv.clientWidth, H=120;
  cv.width=W*dpr; cv.height=H*dpr; const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  let eq=initial; const pts=[eq];
  for (const t of (trades||[])) { eq+=t.pnl; pts.push(eq); }
  if (pts.length<2){ ctx.fillStyle="#8a90a0"; ctx.fillText("데이터 부족", 10, 60); return; }
  const mn=Math.min(...pts), mx=Math.max(...pts), rng=(mx-mn)||1;
  const x=i=>i/(pts.length-1)*(W-8)+4, y=v=>H-8-((v-mn)/rng)*(H-16);
  ctx.beginPath(); ctx.moveTo(x(0),y(pts[0]));
  for (let i=1;i<pts.length;i++) ctx.lineTo(x(i),y(pts[i]));
  ctx.strokeStyle = pts[pts.length-1]>=pts[0] ? "#26d07c" : "#ff5c6c"; ctx.lineWidth=2; ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,.12)"; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(4,y(initial)); ctx.lineTo(W-4,y(initial)); ctx.stroke(); ctx.setLineDash([]);
}

loadStrategies().then(tick); setInterval(tick, 3000);   // 전략 목록 로드 후 3초마다 새로고침
</script>
