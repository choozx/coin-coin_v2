<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>설정</title>
<style>
  :root { --bg:#0e1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3140; --fg:#e6e9ef; --mut:#8a90a0;
          --up:#26d07c; --down:#ff5c6c; --blue:#4c9be8; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font-family:system-ui,-apple-system,sans-serif; }
  .wrap { max-width:1000px; margin:0 auto; padding:20px; }
  header { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  h1 { font-size:18px; margin:0; }
  .sub { color:var(--mut); font-size:13px; }
  .pos { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:16px; }
  .pos h3 { margin:0 0 10px; font-size:14px; color:var(--mut); font-weight:600; }
  .field { display:flex; align-items:center; gap:8px; margin:6px 0; flex-wrap:wrap; font-size:13px; }
  .field input { background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:6px 9px; font-size:13px; }
  .btn-go { padding:6px 14px; border-radius:6px; border:1px solid var(--line); background:var(--panel2);
            color:var(--fg); cursor:pointer; font-size:13px; }
  .btn-go:hover { border-color:var(--blue); }
  .err { background:rgba(255,92,108,.1); border:1px solid var(--down); color:var(--down); padding:12px; border-radius:8px; }
  .fresh-g { color:var(--up); } .fresh-r { color:var(--down); }
  .note { background:rgba(76,155,232,.08); border:1px solid rgba(76,155,232,.35); border-radius:8px;
          padding:10px 12px; font-size:12.5px; color:var(--mut); margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚙️ 설정</h1>
    <span class="sub">글로벌 · 계좌 전역에 적용 (봇·백테스트 공유)</span>
    <!-- 백테스트 스튜디오는 로컬(engine.server)에만 있다. 프로덕션은 __NO_STUDIO__ 로 숨김 -->
    <a href="/backtest" id="studioLink" style="color:var(--blue);text-decoration:none;font-size:13px;margin-left:auto">🔬 백테스트</a>
    <a href="/collector" style="color:var(--blue);text-decoration:none;font-size:13px">📥 데이터·수집기</a>
    <a href="/" style="color:var(--blue);text-decoration:none;font-size:13px">🤖 매매</a>
  </header>

  <div id="guardrails" class="pos"><div class="sub">가드레일 불러오는 중…</div></div>
  <div id="tiers" class="pos"><div class="sub">레버리지 티어 불러오는 중…</div></div>
</div>

<script>
const $ = id => document.getElementById(id);
const ck = v => v ? "checked" : "";

// ── 리스크 가드레일 (계좌 안전장치) ──────────────────────────────────────────
// 걸리면 '새 진입'만 차단한다. 이미 연 포지션의 청산·손절 관리는 계속된다(우아한 정지).
function renderGuardrails(g){
  const dll = g.dailyLossLimit||{}, mcl = g.maxConsecutiveLosses||{};
  $("guardrails").innerHTML =
      `<h3>🛡 리스크 가드레일 <span class="sub">걸리면 새 진입만 차단 · 기존 포지션 청산은 계속</span></h3>`
    + `<div class="field"><label style="min-width:150px"><input type="checkbox" id="gr_dll" ${ck(dll.enabled)}> 일일 손실 한도</label>`
    +   `<input type="number" id="gr_dll_pct" step="any" min="0" style="max-width:80px" value="${dll.pct!=null?dll.pct:10}"><span class="sub">% (오늘 실현손실이 잔고의 이만큼이면 정지)</span></div>`
    + `<div class="field"><label style="min-width:150px"><input type="checkbox" id="gr_mcl" ${ck(mcl.enabled)}> 연속 손실 차단</label>`
    +   `<input type="number" id="gr_mcl_n" min="1" style="max-width:80px" value="${mcl.count!=null?mcl.count:5}"><span class="sub">회 연속 손절 시 정지</span></div>`
    + `<div class="field"><label style="min-width:150px"><input type="checkbox" id="gr_kill" ${ck(g.killSwitch)}> 🔴 킬스위치</label>`
    +   `<span class="sub">즉시 새 진입 정지(마스터). 켜두면 계속 차단</span></div>`
    + `<div style="margin-top:10px;display:flex;gap:8px;align-items:center">`
    +   `<button class="btn-go" onclick="saveGuardrails()">저장</button><span class="sub" id="gr_msg"></span></div>`
    + `<div class="note">발동 여부는 <b>매매 대시보드</b>에서 실시간으로 표시된다 — 여기선 설정만 한다.</div>`;
}
async function saveGuardrails(){
  const g = {
    dailyLossLimit: { enabled: $("gr_dll").checked, pct: Number($("gr_dll_pct").value)||0 },
    maxConsecutiveLosses: { enabled: $("gr_mcl").checked, count: Number($("gr_mcl_n").value)||1 },
    killSwitch: $("gr_kill").checked,
  };
  $("gr_msg").textContent = "저장 중…";
  try {
    const r = await (await fetch("/api/settings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({guardrails:g})})).json();
    if (r.error) throw new Error(r.error);
    $("gr_msg").innerHTML = `<span class="fresh-g">✓ 저장됨</span>`;
  } catch(e){ $("gr_msg").innerHTML = `<span class="fresh-r">저장 실패: ${e.message}</span>`; }
}

// ── 잔고별 레버리지 티어 ────────────────────────────────────────────────────
// 봇이 '동적 레버리지'를 켠 경우 진입 시점 잔고로 이 표를 조회해 레버리지를 정한다.
// 백테스트도 같은 값을 쓴다 — 그래서 여기(글로벌 설정)에 있다.
let _levTiers = [];
function renderTiers(){
  const rows = _levTiers.map((t,i) =>
      `<div class="field" style="margin:4px 0"><span class="sub" style="min-width:70px">잔고 이하 $</span>`
    + `<input type="number" step="any" value="${t.maxBalance==null?"":t.maxBalance}" placeholder="이상(맨 아래)" style="max-width:120px" onchange="_tierSet(${i},'maxBalance',this.value)">`
    + `<span class="sub">→ 레버리지</span>`
    + `<input type="number" min="1" max="125" value="${t.leverage}" style="max-width:70px" onchange="_tierSet(${i},'leverage',this.value)">`
    + `<b onclick="_tierDel(${i})" style="cursor:pointer;color:var(--mut);margin-left:4px">✕</b></div>`).join("");
  $("tiers").innerHTML =
      `<h3>⚖️ 잔고별 레버리지 티어 <span class="sub">봇의 '동적 레버리지'가 켜져 있을 때 적용 · 백테스트도 동일</span></h3>`
    + `<div class="sub" style="margin-bottom:6px">잔고가 '이하 $' 이하면 그 레버리지. 맨 아래(빈칸)=그 이상 전부.</div>`
    + (rows || `<div class="sub">티어 없음 — 추가하지 않으면 프리셋의 고정 레버리지를 쓴다.</div>`)
    + `<button class="btn-go" style="margin-top:6px" onclick="_tierAdd()">+ 티어 추가</button>`
    + `<div style="margin-top:10px;display:flex;gap:8px;align-items:center">`
    +   `<button class="btn-go" onclick="saveTiers()">저장</button><span class="sub" id="tier_msg"></span></div>`
    + `<div class="note">동적 레버리지를 <b>쓸지 말지</b>는 매매 대시보드의 '봇 설정'에서 정한다. 여기선 표만 관리한다.</div>`;
}
function _tierSet(i,k,v){ _levTiers[i][k] = (k==="maxBalance") ? (v===""?null:Number(v)) : (Number(v)||1); }
function _tierDel(i){ _levTiers.splice(i,1); renderTiers(); }
function _tierAdd(){ _levTiers.push({maxBalance:null, leverage:5}); renderTiers(); }
async function saveTiers(){
  $("tier_msg").textContent = "저장 중…";
  try {
    // 오름차순 정렬 — 빈칸(무한대)이 항상 마지막. 서버·엔진이 이 순서를 전제한다.
    const tiers = _levTiers.slice().sort((a,b) =>
        (a.maxBalance==null?Infinity:a.maxBalance) - (b.maxBalance==null?Infinity:b.maxBalance));
    const r = await (await fetch("/api/settings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({leverageTiers: tiers})})).json();
    if (r.error) throw new Error(r.error);
    _levTiers = (r.leverageTiers||[]).map(t => ({maxBalance:t.maxBalance, leverage:t.leverage}));
    renderTiers();
    $("tier_msg").innerHTML = `<span class="fresh-g">✓ 저장됨</span>`;
  } catch(e){ $("tier_msg").innerHTML = `<span class="fresh-r">저장 실패: ${e.message}</span>`; }
}

(async function load(){
  let s;
  try { s = await (await fetch("/api/settings",{cache:"no-store"})).json(); }
  catch(e){
    $("guardrails").innerHTML = `<div class="err">설정 로드 실패: ${e}</div>`;
    $("tiers").innerHTML = "";
    return;
  }
  renderGuardrails(s.guardrails||{});
  _levTiers = (s.leverageTiers||[]).map(t => ({maxBalance:t.maxBalance, leverage:t.leverage}));
  renderTiers();
})();
</script>
<script>
  // dashboard.py(프로덕션)가 주입하는 플래그 — 백테스트 스튜디오가 없는 환경에선 링크를 감춘다.
  if (window.__NO_STUDIO__) { const a = document.getElementById("studioLink"); if (a) a.style.display = "none"; }
</script>
</body>
</html>
