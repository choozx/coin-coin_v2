# prod 브랜치 push → 페이퍼 트레이더 자동 배포.
#   main = 개발, prod = 배포. `git push origin prod` 하면 아래가 돈다.
#   ① GitHub Actions에서 이미지 빌드(TA-Lib 컴파일) → ghcr.io에 push
#   ② EC2는 SSH로 코드 갱신 + 이미지 pull만 (★ EC2에서 컴파일 안 함 → 프리티어 1GB 안전)
#
# 왜 이 방식인가: TA-Lib C 컴파일은 CPU·메모리를 크게 먹어서 1GB EC2에서 --build 하면
#   빌드 중 OOM/타임아웃 위험. 무거운 빌드는 Actions 러너가 하고, EC2는 완성 이미지만 받는다.
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST     : 서버 IP/호스트
#   VPS_USER     : SSH 유저 (예: ubuntu)
#   VPS_SSH_KEY  : 개인키(전체 내용). VPS에 공개키 등록해둘 것
#   VPS_PATH     : 서버의 레포 경로 (예: /home/ubuntu/auto_trading)
#   VPS_PORT     : (선택) SSH 포트, 기본 22
#   GHCR_PAT     : (이미지가 private일 때만) EC2가 ghcr pull에 쓸 PAT(read:packages).
#                  → 패키지를 public으로 바꾸면 이 시크릿·로그인 단계는 불필요.
#
# VPS 1회 준비: Docker 설치 + `git clone <repo>` + `.env` 작성 + 스왑 2GB (docs/deploy.md 참고)
name: Deploy paper trader

on:
  push:
    branches: [prod]
  workflow_dispatch:            # 수동 실행도 허용

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/choozx/coin-coin_v2 (자동 소문자화)

jobs:
  build-push:                   # ① Actions 러너에서 빌드 → ghcr에 push (EC2는 컴파일 안 함)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # ghcr push 권한
    steps:
      - uses: actions/checkout@v4
      - name: 이미지 태그 준비(소문자)
        id: meta
        run: echo "image=$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: ghcr 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 빌드 & 푸시 (latest + 커밋 SHA)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:                       # ② 빌드·푸시 통과 시에만 EC2 배포 (pull only)
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: 이미지 태그 준비(소문자)
        id: meta
        run: echo "image=$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: EC2에 SSH 배포 (pull only, 컴파일 없음)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE_REF,GHCR_PAT,GHCR_USER
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}
            # 최신 compose/preset 파일만 갱신 (소스 컴파일 없음)
            git fetch origin prod
            git checkout -f prod
            git reset --hard origin/prod
            # private 이미지면 로그인(패키지 public이면 이 블록은 무시됨)
            if [ -n "$GHCR_PAT" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            # 이번 커밋 이미지를 .env의 IMAGE로 고정 → 불변 배포
            grep -q '^IMAGE=' .env && sed -i "s|^IMAGE=.*|IMAGE=${IMAGE_REF}|" .env || echo "IMAGE=${IMAGE_REF}" >> .env
            docker compose pull                 # ★ 완성 이미지 받기 (빌드 X)
            docker compose up -d --no-build     # 컴파일 없이 재기동
            docker image prune -f
            docker compose ps
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image }}:${{ github.sha }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
