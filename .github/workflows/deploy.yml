# prod 브랜치 push → 이미지 빌드 → ghcr.io push. **여기까지가 CI의 역할.**
#   main = 개발, prod = 배포. `git push origin main:prod` 하면 아래가 돈다.
#
# 배포(EC2 반영)는 CI가 하지 않는다 — EC2가 스스로 prod를 폴링해 가져간다(풀 방식).
#   서버측: deploy/pull-deploy.sh + systemd 타이머(2분). 설치는 deploy/install-poll-timer.sh.
#
# 왜 CI가 EC2에 SSH 하지 않는가: Actions 러너 IP는 7000개 대역(api.github.com/meta)이라
#   보안그룹(규칙 60개 한도)으로 허용할 수 없다. 22번을 0.0.0.0/0으로 열지 않으려면 서버가
#   먼저 물어보는 수밖에 없다. 부수효과로 GitHub에 서버 접속키를 안 맡겨도 된다
#   (VPS_HOST/VPS_USER/VPS_SSH_KEY/VPS_PATH 시크릿 전부 불필요 — 등록했다면 삭제할 것).
#
# 왜 EC2에서 빌드하지 않는가: TA-Lib C 컴파일은 CPU·메모리를 크게 먹어서 저사양 EC2에서
#   --build 하면 OOM/타임아웃 위험. 무거운 빌드는 Actions 러너가 하고 EC2는 완성 이미지만 받는다.
#
# 이미지 접근: 레포가 public이면 ghcr 패키지도 public이라 EC2가 인증 없이 pull 가능.
#   레포를 private로 바꾸면 EC2에 read:packages PAT로 `docker login ghcr.io` 가 필요해진다.
#
# VPS 1회 준비: Docker 설치 + `git clone <repo>` + `.env` 작성 + 스왑 2GB
#   + deploy/install-poll-timer.sh 실행 (docs/deploy-checklist.md 단계 4~7)
name: Build & push image

on:
  push:
    branches: [prod]
  workflow_dispatch:            # 수동 실행도 허용

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/choozx/coin-coin_v2 (자동 소문자화)

jobs:
  build-push:                   # ① Actions 러너에서 빌드 → ghcr에 push (EC2는 컴파일 안 함)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # ghcr push 권한
    steps:
      - uses: actions/checkout@v4
      - name: 이미지 태그 준비(소문자)
        id: meta
        run: echo "image=$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3      # arm64 크로스빌드용 에뮬레이터 (Graviton 타깃)
      - uses: docker/setup-buildx-action@v3
      - name: ghcr 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 빌드 & 푸시 (arm64, latest + 커밋 SHA)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64             # ★ EC2 t4g(Graviton)용. TA-Lib도 arm64로 소스 컴파일됨
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
