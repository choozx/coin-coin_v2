# 서비스별 "이 파일이 바뀌면 이 컨테이너를 다시 띄워야 한다" 매핑.
#
# 왜 필요한가: 세 서비스가 같은 이미지를 공유해서 `docker compose up -d` 를 그냥 부르면
#   셋 다 재생성된다. 대시보드 CSS 한 줄 고쳤다고 포지션 들고 있는 매매 봇이 재시작되는 건
#   위험하다. 그래서 배포 폴러가 바뀐 경로를 보고 영향받는 서비스만 교체한다.
#
# <service>_mods = engine/<이름>.py 로 해석되는 모듈 목록 (그 서비스의 import 폐포).
#   ★ 손으로 관리하지 말 것 — tests/test_deploy_paths.py 가 실제 import 그래프를 AST로
#     다시 계산해 이 목록과 대조한다. 모듈을 추가/삭제하면 그 테스트가 먼저 깨진다.
# <service>_extra = 모듈이 아닌 경로(정규식). 데이터·템플릿·정적파일.
# all_extra = 이미지/런타임 자체가 바뀌므로 전 서비스 대상.

trader_mods=live backtest binance_data binance_math candle_store candles conditions control env executor indicators ledger metrics preset settings
collector_mods=collector binance_data candle_store candles control env
dashboard_mods=dashboard backtest binance_data binance_math candle_store candles conditions control env indicators ledger metrics optimize preset run server settings synthetic trade_chart

trader_extra=^presets/|^schema/
collector_extra=
dashboard_extra=^presets/|^schema/|^engine/(dashboard|gui|collector)\.html$|^engine/vendor/

all_extra=^requirements\.txt$|^Dockerfile$|^docker-compose\.yml$
