# 멀티서비스 배포. 각 서비스가 독립 컨테이너 → 하나만 재배포해도 나머지는 안 멈춘다.
#   docker compose up -d --build              # 전체
#   docker compose up -d --build dashboard    # 대시보드만 재배포 (trader/collector 계속 돔) ✅
# 설정은 .env (gitignore). 셋 다 ./data 볼륨 공유(캔들 캐시 + 봇 상태 state.json).
services:

  trader:                                   # 실매매/페이퍼 봇 — 24/7, 안 멈춤
    build: .
    image: auto-trading
    restart: unless-stopped
    command: >
      sh -c "python -m engine.live \"$PRESET\" --paper --interval \"$INTERVAL\" --equity \"$EQUITY\""
    environment:
      PRESET: ${PRESET:-presets/examples/rsi-oversold-long.json}
      INTERVAL: ${INTERVAL:-60}
      EQUITY: ${EQUITY:-10000}
      NOTIFY_WEBHOOK: ${NOTIFY_WEBHOOK:-}
      CONTROL_PATH: /app/data/control.json  # 대시보드의 멈춤/재개 신호를 읽음
      TZ: UTC
    volumes:
      - ./data:/app/data                    # 캔들 캐시 + state.json(대시보드가 읽음)
      - ./presets:/app/presets:ro
    logging: { driver: json-file, options: { max-size: "10m", max-file: "5" } }

  dashboard:                                # 모니터링 웹 — 이것만 재배포해도 봇 안 멈춤
    build: .
    image: auto-trading
    restart: unless-stopped
    command: python -m engine.dashboard --port 8080
    environment:
      STATE_PATH: /app/data/state.json      # trader가 기록한 상태를 읽음
      CONTROL_PATH: /app/data/control.json  # 멈춤/재개 제어 파일(대시보드가 씀)
      TZ: UTC
    ports:
      - "${DASH_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data                    # state 읽기 + control 쓰기(멈춤/재개)
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  collector:                                # 캔들 수집 — 24/7 (trader도 자체 수집하나, 워치리스트 유지용)
    build: .
    image: auto-trading
    restart: unless-stopped
    command: >
      sh -c "python -m engine.collector $COLLECT_SYMBOLS --loop \"$INTERVAL\""
    environment:
      COLLECT_SYMBOLS: ${COLLECT_SYMBOLS:-BTCUSDC}
      INTERVAL: ${INTERVAL:-60}
      CONTROL_PATH: /app/data/control.json  # 대시보드의 멈춤/재개 신호를 읽음
      TZ: UTC
    volumes:
      - ./data:/app/data
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

# ⚠️ 실거래(LiveExecutor) 시 BINANCE_API_KEY/SECRET은 .env(gitignore)/시크릿으로. compose에 직접 X.
