# 페이퍼 트레이더 배포. VPS에서 `docker compose up -d --build`.
# 설정은 .env 파일 또는 환경변수로 (아래 ${...} 기본값).
services:
  paper:
    build: .
    image: auto-trading-paper
    restart: unless-stopped                 # 죽으면 자동 재시작
    environment:
      PRESET: ${PRESET:-presets/examples/rsi-oversold-long.json}
      INTERVAL: ${INTERVAL:-60}
      EQUITY: ${EQUITY:-10000}
      NOTIFY_WEBHOOK: ${NOTIFY_WEBHOOK:-}    # (선택) Discord/Slack 웹훅
      TZ: UTC
    volumes:
      - ./data:/app/data                    # 캔들 캐시(SQLite) 지속 → 재시작해도 워밍업 빠름
      - ./presets:/app/presets:ro           # 프리셋(읽기 전용). saved/ 프리셋도 여기로 마운트됨
    logging:                                # 로그 무한증식 방지
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

# ⚠️ 실거래(LiveExecutor) 붙일 땐 여기 BINANCE_API_KEY/SECRET을 추가하되
#    절대 compose 파일에 직접 쓰지 말고 .env(gitignore) 또는 시크릿으로.
