# 멀티서비스 배포. 각 서비스가 독립 컨테이너 → 하나만 재배포해도 나머지는 안 멈춘다.
#   [로컬]  docker compose up -d --build            # 직접 빌드해서 전체 기동
#   [로컬]  docker compose up -d --build dashboard  # 대시보드만 재배포 (trader/collector 계속 돔) ✅
#   [프로덕션] .env에 IMAGE=ghcr.io/OWNER/REPO:TAG → docker compose pull && up -d --no-build
#              (EC2에서 컴파일 안 함 — 프리티어 1GB 안전. CI가 빌드해 ghcr에 올림)
# 설정은 .env (gitignore). 셋 다 ./data 볼륨 공유(캔들 캐시 + 봇 상태 state.json).
# 메모리 상한(mem_limit): EC2 t4g.small(2GB) 기준 — 한 컨테이너가 다 먹고 OOM 나는 것 방지.
#   합계 ~1.5G(2GB 내, OS/도커 여유 ~0.5G + 스왑 2GB 완충). limit 초과 시 그 컨테이너만 재시작.
#   ※ 1GB 인스턴스(t3.micro)로 내려가면 340/200/160 + 스왑 필수로 조정할 것.
services:

  trader:                                   # 실매매/페이퍼 봇 — 24/7, 안 멈춤
    build: .                                # 로컬 빌드용. 프로덕션은 IMAGE(ghcr) pull 사용
    image: ${IMAGE:-auto-trading}           # .env의 IMAGE로 레지스트리 이미지 지정 가능
    restart: unless-stopped
    mem_limit: 800m                         # 워밍업 때 캔들 로드로 피크 → 가장 여유 있게
    mem_reservation: 300m
    command: >
      sh -c "python -m engine.live \"$PRESET\" --paper --interval \"$INTERVAL\" --equity \"$EQUITY\""
    environment:
      PRESET: ${PRESET:-presets/examples/rsi-oversold-long.json}
      INTERVAL: ${INTERVAL:-60}
      EQUITY: ${EQUITY:-10000}
      NOTIFY_WEBHOOK: ${NOTIFY_WEBHOOK:-}
      CONTROL_PATH: /app/data/control.json  # 대시보드의 멈춤/재개 신호를 읽음
      LEDGER_PATH: /app/data/trades.db      # 매매 원장(대시보드가 읽음)
      # 실거래 키 — .env(gitignore)에서 주입. 트레이더만 필요(collector·dashboard엔 X).
      # 출금권한 OFF·IP 화이트리스트 필수. 미설정이면 페이퍼(--paper)로만 동작.
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BINANCE_TESTNET: ${BINANCE_TESTNET:-1}
      PYTHONUNBUFFERED: 1                   # 도커 stdout은 파이프 → 블록버퍼링. 없으면 로그가 안 보임
      TZ: UTC
    volumes:
      - ./data:/app/data                    # 캔들 캐시 + state.json(대시보드가 읽음)
      - ./presets:/app/presets:ro
    logging: { driver: json-file, options: { max-size: "10m", max-file: "5" } }

  dashboard:                                # 대시보드만 (모니터 + 봇 멈춤/재개). 백테스트는 프로덕션에 안 올림.
    build: .                                # 이것만 재배포해도 trader/collector 안 멈춤. 가볍고 안전.
    image: ${IMAGE:-auto-trading}
    restart: unless-stopped
    mem_limit: 300m
    mem_reservation: 120m
    command: python -m engine.dashboard --port 8080
    environment:
      STATE_PATH: /app/data/state.json      # trader가 기록한 상태를 읽음
      CONTROL_PATH: /app/data/control.json  # 멈춤/재개 제어 파일
      LEDGER_PATH: /app/data/trades.db      # 매매 원장 읽기(이력·통계·거래별 차트)
      PYTHONUNBUFFERED: 1
      TZ: UTC
    ports:
      - "${DASH_PORT:-8080}:8080"           # 대시보드만 노출(내 IP 제한 권장)
    volumes:
      - ./data:/app/data                    # state 읽기 + control 쓰기(멈춤/재개)
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }
    # 로컬에서 백테스트+대시보드 둘 다 보려면(프로덕션 아님):
    #   python3 -m engine.server            # http://localhost:8765  (/ 대시보드, /backtest 스튜디오, /collector 데이터)

  collector:                                # 캔들 수집 — 24/7 (trader도 자체 수집하나, 워치리스트 유지용)
    build: .
    image: ${IMAGE:-auto-trading}
    restart: unless-stopped
    mem_limit: 400m
    mem_reservation: 150m
    command: >
      sh -c "python -m engine.collector $COLLECT_SYMBOLS --loop \"$INTERVAL\""
    environment:
      COLLECT_SYMBOLS: ${COLLECT_SYMBOLS:-BTCUSDC}
      INTERVAL: ${INTERVAL:-60}
      CONTROL_PATH: /app/data/control.json  # 대시보드의 멈춤/재개 신호를 읽음
      PYTHONUNBUFFERED: 1                   # ★ 수집기는 flush=True가 거의 없어 이게 없으면 로그가 통째로 안 보임
      TZ: UTC
    volumes:
      - ./data:/app/data
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

# ⚠️ 실거래(LiveExecutor) 시 BINANCE_API_KEY/SECRET은 .env(gitignore)/시크릿으로. compose에 직접 X.
